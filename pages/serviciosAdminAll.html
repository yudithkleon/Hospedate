<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Servicios | HospeDATE</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />

    <!-- Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet" />

    <!-- Estilos -->
      <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/navFooter.css" />
    <link rel="stylesheet" href="../styles/serviciosAdicionales.css" />
  </head>

  <body class="layout-root">

    <!-- NAVBAR -->
     <div id="app-navbar"></div>

    <div class="container py-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Servicios del Hotel</h2>
        <input
          id="buscador"
          type="text"
          class="form-control w-50"
          placeholder="Buscar servicio..." />
      </div>
      <div id="contenedorServicios" class="row g-4"></div>
    </div>


      <!-- el modal -->
      <div class="modal fade" id="modalEditarServicio" tabindex="-1">
        <div class="modal-dialog">
          <div class="modal-content">

            <div class="modal-header">
              <h5 class="modal-title">Editar Servicio</h5>
              <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
              <form id="formEditarServicio">
                <input type="hidden" id="editarId">

                <div class="mb-3">
                  <label class="form-label">Nombre</label>
                  <input id="editarNombre" class="form-control">
                </div>

                <div class="mb-3">
                  <label class="form-label">Precio</label>
                  <input id="editarPrecio" type="number" class="form-control">
                </div>

                <button class="btn btn-primary w-100">Guardar cambios</button>
              </form>
            </div>

          </div>
        </div>
      </div>


    <!-- FOOTER -->
  <div id="app-footer"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../scripts/serviciosAdmin.js"></script>
    <script type="module" src="../scripts/authNavbar.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
         <!-- <script type="module" src="../scripts/servicios.js"></script> -->
    <script type="module" src="../scripts/serviciosAdmin.js"></script>
  </body>
</html>
