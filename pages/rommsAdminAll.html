<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habitaciones | Admin</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- Estilos -->
         <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/navFooter.css" />
  <link rel="stylesheet" href="../styles/romms.css" />
</head>

<body class="layout-root">

  <!-- NAVBAR -->
     <div id="app-navbar"></div>

  <!-- CONTENIDO -->
  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-bold">Habitaciones del Hotel</h2>

      <input
        id="buscador"
        type="text"
        class="form-control w-50"
        placeholder="Buscar por número, tipo o capacidad"/>
    </div>

    <!-- CONTENEDOR -->
    <div id="contenedorHabitaciones" class="row g-4"></div>
  </div>

  <!-- FOOTER -->
  <footer class="custom-footer text-center text-light py-4">
    <p class="mb-1">© 2025 — HospeDate</p>
    <small>Todos los derechos reservados</small>
  </footer>

<!-- MODAL EDITAR HABITACIÓN -->
<div class="modal fade" id="modalEditar" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Editar Habitación</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="editId">

        <input id="editNumero" class="form-control mb-2" placeholder="Número">
        <input id="editTipo" class="form-control mb-2" placeholder="Tipo">
        <input id="editCapacidad" type="number" class="form-control mb-2" placeholder="Capacidad">
        <input id="editPrecio" type="number" class="form-control mb-2" placeholder="Precio">
        <textarea id="editDescripcion" class="form-control mb-2" placeholder="Descripción"></textarea>
        <input id="editImagen" class="form-control mb-2" placeholder="URL Imagen">
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary" id="btnGuardarCambios">Guardar</button>
      </div>

    </div>
  </div>
</div>

 <!-- FOOTER -->
  <div id="app-footer"></div>

  <!-- Scripts -->
  <script type="module" src="../scripts/rommsAdmin.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
