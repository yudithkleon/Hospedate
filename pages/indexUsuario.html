<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio | hospeDATE</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Estilos -->
           <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/navFooter.css" />
    <link rel="stylesheet" href="../styles/index.css" />
  </head>

   <body class="layout-root">
    <!-- NAVBAR -->
     <div id="app-navbar"></div>

    <!-- HERO -->
    <section class="hero">
      <div class="hero-content container">
        <h1 class="text-light fw-bold">Encuentra tu habitación ideal</h1>

        <div class="search-box shadow">
         <!-- <div class="search-item">
            <i class="bi bi-geo-alt"></i>
            <input type="text" placeholder="¿A dónde vas?" id="buscarDestino" />
          </div> -->

          <div class="search-item">
            <i class="bi bi-calendar-event"></i>
            <input type="date" id="checkIn" />
          </div>

          <div class="search-item">
            <i class="bi bi-calendar-check"></i>
            <input type="date" id="checkOut" />
          </div>

          <div class="search-item">
            <i class="bi bi-people"></i>
            <select id="personas">
              <option>1 adulto</option>
              <option>2 adultos</option>
              <option>3 adultos</option>
            </select>
          </div>

          <button id="btnBuscar" class="btn-search">Buscar</button>
        </div>
      </div>
    </section>

    <!-- BANNER DE HABITACIONES -->
    <section class="banner-hoteles container">
      <h2 class="titulodeslider">OFERTAS DE HABITACIONES</h2>

      <div class="slider">
        <button class="btn-slider" id="btnPrev">
          <i class="bi bi-chevron-left"></i>
        </button>

        <div class="slide-track" id="slideTrack">
          <div class="slide">
            <img
              src="https://www.cataloniahotels.com/es/blog/wp-content/uploads/2016/05/habitaci%C3%B3n-doble-catalonia-620x412.jpg"
              alt="suite moderna"
            />
            <h3>Suite Moderna</h3>
            <p>Desde $150.000 COP</p>
          </div>

          <div class="slide">
            <img
              src="https://i.pinimg.com/1200x/42/b6/8c/42b68cd2490f7a0467234a71b4d4d6fb.jpg"
              alt="habitación doble cómoda"
            />
            <h3>Habitación Doble</h3>
            <p>Desde $120.000 COP</p>
          </div>

          <div class="slide">
            <img
              src="https://i.pinimg.com/1200x/a7/6d/06/a76d067562b3ed9a97a8b07989138841.jpg"
              alt="suite premium moderna"
            />
            <h3>Suite Premium</h3>
            <p>Desde $150.000 COP</p>
          </div>

          <div class="slide">
            <img
              src="https://i.pinimg.com/1200x/a7/6d/06/a76d067562b3ed9a97a8b07989138841.jpg"
              alt="suite premium moderna"
            />
            <h3>Suite Premium</h3>
            <p>Desde $250.000 COP</p>
          </div>

          <div class="slide">
            <img
              src="https://i.pinimg.com/1200x/42/b6/8c/42b68cd2490f7a0467234a71b4d4d6fb.jpg"
              alt="habitación doble cómoda"
            />
            <h3>Habitación Doble</h3>
            <p>Desde $150.000 COP</p>
          </div>
        </div>

        <button class="btn-slider" id="btnNext">
          <i class="bi bi-chevron-right"></i>
        </button>
      </div>
    </section>

 <!-- FOOTER -->
  <div id="app-footer"></div>
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../scripts/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../scripts/authNavbar.js"></script>

  </body>
</html>
