<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Nuevo Servicio</title>

    <!-- BOOTSTRAP -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <!-- ICONOS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
      <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/crearha.css" />
    <link rel="stylesheet" href="../styles/navFooter.css" />
  </head>

  <body class="layout-root">
    <!-- NAVBAR -->
     <div id="app-navbar"></div>

    <!-- CONTENIDO -->
    <div class="container mt-4">
      <h2 class="text-center fw-bold mb-4">
        Crear Nuevo Servicio
      </h2>

      <div class="d-flex justify-content-center">
        <div
          class="card shadow p-4"
          style="max-width: 850px; width: 85%"
        >
          <form id="formServicio">
            <!-- Nombre -->
            <div class="mb-3">
              <label class="form-label">
                Nombre del servicio *
              </label>
              <input
                type="text"
                id="nombre"
                class="form-control"
                placeholder="Ej: Desayuno buffet"
              />
            </div>

            <!-- Tipo -->
            <div class="mb-3">
              <label class="form-label">
                Tipo de servicio *
              </label>
              <select id="tipo" class="form-select">
                <option disabled selected>Selecciona...</option>
                <option>Alimentación</option>
                <option>Transporte</option>
                <option>Bienestar</option>
                <option>Entretenimiento</option>
              </select>
            </div>

            <!-- Descripción -->
            <div class="mb-3">
              <label class="form-label">
                Descripción *
              </label>
              <textarea
                id="descripcion"
                class="form-control"
                rows="3"
                placeholder="Describe el servicio"
              ></textarea>
            </div>

            <!-- Precio -->
            <div class="mb-3">
              <label class="form-label">
                Precio del servicio *
              </label>
              <input
                type="number"
                id="precio"
                class="form-control"
                placeholder="Ej: 30000"
              />
            </div>

         
            <!-- Botón -->
            <button type="submit" class="btn btn-primary w-100 mt-3">
              Guardar Servicio
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
  <div id="app-footer"></div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- JS DEL SERVICIO -->
    <script type="module" src="../scripts/crearservicio.js"></script>

    <script type="module" src="../scripts/main.js"></script>
    <script src="../scripts/session.js"></script>
    <script type="module" src="../scripts/authNavbar.js"></script>
    <script type="module" src="../scripts/ServiciosAdicionalesAdmin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- <script type="module" src="../scripts/servicios.js"></script> -->
    <!-- <script type="module" src="../scripts/serviciosAdmin.js"></script> -->
  </body>
</html>
