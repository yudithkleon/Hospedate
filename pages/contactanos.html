<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contactenos | hospeDATE</title>

    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <!-- Iconos Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <!-- ESTILOS DEL PROYECTO -->
    <link rel="stylesheet" href="../styles/base.css" />

    <link rel="stylesheet" href="../styles/navFooter.css" />
    <link rel="stylesheet" href="../styles/contactos.css" />
  </head>

  <body class="layout-root">
    <!-- NAVBAR -->
    <div id="app-navbar"></div>
    <!-- DESCRIPCION -->
    <div class="container">
      <p class="text-center mt-3 text-secondary">
        ¿Necesitas información sobre nuestras reservas, servicios o
        disponibilidad? Escríbenos y nuestro equipo se comunicará contigo lo más
        pronto posible.
      </p>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">
      <div class="container mt-4 mb-5 fondo-contacto">
      <div class="row g-4">
        <!-- INFORMACION -->
        <div class="col-md-4 mt-5">
          <div class="card-contacto">
            <h4 class="mb-3">Contacto</h4>

            <p><i class="bi bi-envelope"></i> contacto@hospedate.com</p>
            <p><i class="bi bi-phone"></i> +57 310 456 7890</p>
            <p><i class="bi bi-geo-alt"></i> Bogota, Colombia</p>
          </div>
        </div>

        <!-- FORMULARIO -->
        <div class="col-md-8">
          <form
            id="formContacto"
            action="https://formspree.io/f/mrbvjgbw"
            method="POST"
            class="card-contacto"
          >
            <div class="mb-3">
              <label class="form-label">Nombre</label>
              <input
                type="text"
                id="nombre"
                name="nombre"
                class="form-control"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Telefono</label>
              <input
                type="tel"
                id="telefono"
                name="telefono"
                class="form-control"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Correo Electronico</label>
              <input
                type="email"
                name="email"
                id="correo"
                class="form-control"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Mensaje</label>
              <textarea
                id="mensaje"
                name="message"
                rows="5"
                class="form-control"
                required
              ></textarea>
            </div>

            <button class="btn btn-custom-send px-4 py-2" type="submit">
              Enviar <i class="bi bi-send-fill"></i>
            </button>
          </form>
        </div>
      </div>
      </div>
    </main>

    <!-- FOOTER -->
    <div id="app-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="../scripts/session.js"></script>
    <script type="module" src="../scripts/authNavbar.js"></script>
  </body>
</html>
