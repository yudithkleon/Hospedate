<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Iniciar Sesión | hospeDATE</title>

        <!-- Bootstrap CSS -->
        <link rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

        <!-- Iconos Bootstrap -->
        <link rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

        <!-- ESTILOS DEL PROYECTO -->
               <link rel="stylesheet" href="../styles/base.css" />
        <link rel="stylesheet" href="../styles/login.css">
        <link rel="stylesheet" href="../styles/navFooter.css">
    </head>

     <body class="layout-root">
      <!-- NAVBAR -->
     <div id="app-navbar"></div>
        <!-- Login -->
        <div class="container-fluid login-container">
            <div class="row h-100">

                <!-- Columna izquierda: Carrusel -->
                <div class="col-md-7 d-none d-md-block p-0">
                    <div id="carouselExample" class="carousel slide h-100"
                        data-bs-ride="carousel">
                        <div class="carousel-inner h-100">
                            <div class="carousel-item active h-100">
                                <img src="../assets/ImgsBanner/banner-login1.jpg"
                                    class="d-block w-100" alt="Imagen 1">
                            </div>
                            <div class="carousel-item h-100">
                                <img src="../assets/ImgsBanner/banner-login2.jpg"
                                    class="d-block w-100" alt="Imagen 2">
                            </div>
                            <div class="carousel-item h-100">
                                <img src="../assets/ImgsBanner/banner-login-3.jpg"
                                    class="d-block w-100" alt="Imagen 3">
                            </div>
                             <div class="carousel-item h-100">
                                <img src="../assets/ImgsBanner/banner-login4.jpg"
                                    class="d-block w-100" alt="Imagen 3">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Columna derecha: Formulario -->
                <div
                    class="col-md-5 d-flex justify-content-center align-items-center bg-white">
                    <div class="form-box">

                        <h3 class="text-center mb-4 fw-bold">Iniciar sesión</h3>

                        <div class="mb-3">
                            <label class="form-label">Correo electrónico
                                *</label>
                            <input type="email" id="email" class="form-control"
                                placeholder="correo@ejemplo.com">
                        </div>

                <div class="mb-3">
                     <label class="form-label">Contraseña *</label>
                     <div class="input-group">
                          <input type="password" id="password" class="form-control" placeholder="••••••••">
                           <span class="input-group-text" id="toggleLoginPass" style="cursor: pointer;">
                                 <i class="bi bi-eye-slash"></i>
                                  </span>
                          </div>
                 </div>

                      <button id="btnLogin" class="btn btn-primary w-100">Ingresar</button>


                        <div class="text-center mt-3">
                            <a href="#" class="small">Olvidé mi contraseña</a>
                        </div>
                        <div class="text-center mt-2">
                            ¿Nuevo usuario?
                            <a href="registro.html"
                                class="fw-semibold">Regístrate aquí</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>

  <!-- FOOTER -->
  <div id="app-footer"></div>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
        <script type="module" src="../scripts/login.js"></script>
            <script type="module" src="../scripts/authNavbar.js"></script>
    </body>
</html>
