<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reserva | hospeDATE</title>

    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <!-- Iconos Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <!-- ESTILOS DEL PROYECTO -->
           <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/reservas.css" />
    <link rel="stylesheet" href="../styles/navFooter.css" />
  </head>

   <body class="layout-root">
    <!-- NAVBAR -->
     <div id="app-navbar"></div>

    <main class="container">
      <h3 class="mb-4 fw-bold text-primary mt-4">Habitaciones Disponibles</h3>

      <div id="habitacionesGrid" class="row g-4">
        <!-- JS insertará las cards -->
      </div>
    </main>

    <!-- MODAL RESERVA -->

    <div
      class="modal fade"
      id="modalReserva"
      tabindex="-1"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title">Registro de Reserva</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <form id="formReserva">
              <!-- HABITACIÓN -->
              <h6 class="fw-bold">Habitación Seleccionada</h6>
              <div class="row mb-3">
                <div class="col-md-4">
                  <label class="form-label fw-bold">Número</label>
                  <input id="habNumero" class="form-control" disabled />
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-bold">Tipo</label>
                  <input id="habTipo" class="form-control" disabled />
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-bold">Precio Noche</label>
                  <input id="habPrecio" class="form-control" disabled />
                </div>
              </div>

              <!-- HUÉSPED -->
              <h6 class="fw-bold mt-4">Datos del Huésped</h6>
              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label fw-bold">Nombre</label>
                  <input id="userNombre" class="form-control" disabled />
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-bold">Apellido</label>
                  <input id="userApellido" class="form-control" disabled />
                </div>
              </div>
              <div class="row mb-3">
                <div class="col-md-4">
                  <label class="form-label fw-bold">Tipo Doc</label>
                  <input id="userTipoDoc" class="form-control" disabled />
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-bold">Número Doc</label>
                  <input id="userNumDoc" class="form-control" disabled />
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-bold">Teléfono</label>
                  <input id="userTel" class="form-control" disabled />
                </div>
              </div>

              <!-- FECHAS -->
              <h6 class="fw-bold mt-4">Fechas de la Reserva</h6>
              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label fw-bold">Ingreso</label>
                  <input type="date" id="checkIn" class="form-control" />
                  
<small id="error-checkIn" class="text-danger"></small>

                </div>
                <div class="col-md-6">
                  <label class="form-label fw-bold">Salida</label>
                  <input type="date" id="checkOut" class="form-control" />
                  <small id="error-checkOut" class="text-danger"></small>

                </div>
              </div>

              <!-- SERVICIOS ADICIONALES -->
              <h6 class="fw-bold mt-4">Servicios Adicionales</h6>
              <div id="serviciosContainer"  class="row mb-3 ps-2">
                 <!-- Aquí voy a pintar el servicios -->
                </div>  

              <!-- RESUMEN DE COSTO -->
              <h6 class="fw-bold mt-4">Resumen de costos</h6>
              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label fw-bold">Precio por noche</label>
                  <input id="precioPorNoche" class="form-control" readonly />
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-bold">Noches</label>
                  <input id="cantidadNoches" class="form-control" readonly />
                </div>

                <div class="col-md-6 mt-3">
                  <label class="form-label fw-bold">Monto total</label>
                  <input id="montoTotal" class="form-control" readonly />
                </div>

                <div class="col-md-6 mt-3">
                  <label class="form-label fw-bold">Saldo pendiente</label>
                  <input id="saldoPendiente" class="form-control" readonly />
                </div>
              </div>

              <!-- PAGO -->
              <h6 class="fw-bold mt-4">Pago</h6>
              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label fw-bold">Método</label>
                  <select id="metodoPago" class="form-control">
                    <option value="TARJETA">Tarjeta</option>
                    <option value="EFECTIVO">Efectivo</option>
                    <option value="TRANSFERENCIA">Transferencia</option>
                  </select>
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-bold">Abono Inicial</label>
                  <input
                    type="number"
                    id="abono"
                    class="form-control"
                    placeholder="0"
                  />
                  <small id="error-abono" class="text-danger"></small>

                </div>
              </div>

              <!-- NOTAS -->
              <h6 class="fw-bold mt-4">Notas</h6>
              <textarea id="notas" class="form-control" rows="3"></textarea>
            </form>
          </div>

          <div class="modal-footer">
            <button class="btn btn-primary fw-bold" id="btnConfirmarReserva">
              Confirmar Reserva
            </button>
          </div>
        </div>
      </div>
    </div>

 <!-- FOOTER -->
  <div id="app-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!-- <script type="module" src="../scripts/main.js"></script> -->
    <script type="module" src="../scripts/reservarDesdeUsuario.js"></script>
    <script type="module" src="../scripts/reservarParaUsuario.js"></script>
    <script type="module" src="../scripts/authNavbar.js"></script>    
  </body>
</html>
