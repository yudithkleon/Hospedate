<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | hospeDATE</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Iconos Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- ESTILOS DEL PROYECTO -->
           <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/login.css">
    <link rel="stylesheet" href="../styles/navFooter.css">
      <link rel="stylesheet" href="../styles/perfil.css">
</head>

 <body class="layout-root">
   <!-- NAVBAR -->
     <div id="app-navbar"></div>
  <form class="form-box" id="formPerfil" novalidate>
    <h3 class="text-center mb-3 fw-bold">Mi Perfil</h3>

    <!-- FOTO DE PERFIL -->
    <div class="text-center mb-4">
        <img id="fotoPerfil"
             src="../assets/avatar-default.png"
             class="rounded-circle mb-2"
             width="120"
             height="120"
             style="object-fit: cover;">
        <div>
            <input type="file" id="inputFoto" accept="image/*" class="form-control form-control-sm">
        </div>
    </div>

    <!-- Nombre y Apellido -->
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Nombre</label>
            <input id="nombre" type="text" class="form-control">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Apellido</label>
            <input id="apellido" type="text" class="form-control">
        </div>
    </div>

    <!-- Documento -->
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Tipo de documento</label>
               <input id="tipoDoc" type="text" class="form-control" disabled>
            
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label">Numero de documento</label>
            <input id="numeroDoc" type="text" class="form-control" disabled>
        </div>
    </div>

    <!-- Correo -->
    <div class="mb-3">
        <label class="form-label">Correo electronico</label>
        <input id="correo" type="email" class="form-control" disabled>
    </div>

    <!-- Telefono -->
    <div class="mb-3">
        <label class="form-label">Telefono</label>
        <input id="telefono" type="text" class="form-control">
    </div>

    <button type="submit" class="btn btn-primary w-100">
        Guardar cambios
    </button>
</form>



    <!-- FOOTER -->
  <div id="app-footer"></div>

    <script type="module" src="../scripts/authNavbar.js"></script>
    <script type="module" src="../scripts/perfil.js"></script>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

            crossorigin="anonymous"></script>
    
</body>
</html>
